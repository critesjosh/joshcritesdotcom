<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} — Josh Crites</title>
    <meta name="description" content="{{ page.description | escape }}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:title" content="{{ page.title | escape }}" />
    <meta
      property="og:description"
      content="{{ page.description | escape }}"
    />
    <meta
      property="og:image"
      content="{{ '/favicon/android-chrome-512x512.png' | absolute_url }}"
    />
    <meta
      property="article:published_time"
      content="{{ page.date | date_to_xmlschema }}"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ page.title | escape }}" />
    <meta
      name="twitter:description"
      content="{{ page.description | escape }}"
    />
    <meta
      name="twitter:image"
      content="{{ '/favicon/android-chrome-512x512.png' | absolute_url }}"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="theme-color" content="#f8f7f2" />
    <link rel="stylesheet" href="/assets/post.css" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to article</a>
    <header class="site-header">
      <a class="site-name" href="/">Josh Crites</a>
      <nav aria-label="Article navigation">
        <a href="/#ideas">Ideas and notes</a>
      </nav>
    </header>
    <main id="content">
      <article>
        <header class="article-header">
          <p class="eyebrow">Essay</p>
          <h1>{{ page.title }}</h1>
          {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
          <p class="meta">
            <time datetime="{{ page.date | date: '%Y-%m-%d' }}"
              >{{ page.date | date: '%B %-d, %Y' }}</time
            >
          </p>
        </header>
        <div class="article-body">{{ content }}</div>
      </article>
      <nav class="article-footer" aria-label="After this article">
        <a href="/#ideas">More ideas and notes</a>
      </nav>
    </main>
    <footer>Josh Crites. A personal site and early digital assemblage.</footer>
  </body>
</html>
